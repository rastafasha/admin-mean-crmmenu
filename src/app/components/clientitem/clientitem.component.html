<div class="card shadow-sm rounded">
  <div class="card-body">
    <div class="topeproject">
      <img [src]="(cliente?.img||'') | imagenPipe:'projects'" alt="">
      <div class="datos ">
        <h5 class="card-title fw-bold text-dark m-0 p-0">{{ cliente.name }}</h5>
      </div>
      <span class="badge bg-primary text-white small">{{ cliente.category.nombre }}</span>
    </div>

    <div class="mt-3">
      <div class="d-flex align-items-center mb-2">
        <div class="i fa fa-instagram"></div> &nbsp;&nbsp;
        <a [href]="cliente.rrss" target="_blank" rel="noopener noreferrer" class="text-primary text-decoration-none">
          Visitar Cliente Instagram
        </a>
      </div>
      <details>
        <summary class="">Detalles </summary>
        <div class="features small mb-auto">
          <div class="d-flex align-items-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
              class="bi bi-clock text-secondary me-2" viewBox="0 0 16 16">
              <path
                d="M8 3.5a.5.5 0 01.5.5v3.25l2.5 1.5a.5.5 0 11-.5.866l-2.75-1.65A.5.5 0 017.5 7V4a.5.5 0 01.5-.5z" />
              <path d="M8 16A8 8 0 108 0a8 8 0 000 16zM8 1a7 7 0 110 14A7 7 0 018 1z" />
            </svg>
            <span class="text-secondary" *ngIf="cliente.dateTest">
              Fecha Test: {{ cliente.dateTest }}
            </span>
            <span class="text-secondary" *ngIf="!cliente.dateInicio">
              Fecha Inicio: Pendiente
            </span>
          </div>

          <div class="d-flex align-items-center">
            <i class="fa fa-map-pin"></i>&nbsp; &nbsp;
            <span class="text-secondary">
              Ubicación: {{ cliente.ubicacion }}
            </span>
          </div>
          <div class="d-flex align-items-center">
            <i class="fa fa-map"></i>&nbsp; &nbsp;
            <span class="text-secondary">
              Pais: {{ cliente.pais.pais }}
            </span>
          </div>
        </div>
      </details>
    </div>

    <div class="mt-4 d-flex justify-content-between align-items-center">
      <button (click)="togglePresentation()" [ngClass]="{
          'btn btn-success': cliente.status === true,
          'btn btn-danger': cliente.status !== true
        }">
        {{ cliente.status === true ? 'Aprobado' : 'Falta Aprobar' }}
      </button>

      <div class="d-flex gap-2">
        <button href="javascript:void(0)" (click)="openEditModal(cliente)" data-bs-toggle="modal"
          data-bs-target="#editCliente" class="btn btn-link text-primary p-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil"
            viewBox="0 0 16 16">
            <path
              d="M12.146.854a.5.5 0 01.708 0l2.292 2.292a.5.5 0 010 .708l-9.793 9.793a.5.5 0 01-.168.11l-4 1.5a.5.5 0 01-.65-.65l1.5-4a.5.5 0 01.11-.168l9.793-9.793z" />
          </svg>
        </button>

      </div>
    </div>
  </div>
</div>
